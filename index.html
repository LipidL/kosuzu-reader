<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novel Reader</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <script type="module" src="/src/main.ts" defer></script>
</head>

<body>
  <header class="app-header">
    <h1 class="app-title">Novel Reader</h1>
    <button id="add-books-btn" class="btn btn-primary">+ Add Books</button>
  </header>

  <main id="main-content">
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">📚</div>
      <p class="empty-title">Your library is empty</p>
      <p class="empty-sub">Click <strong>+ Add Books</strong> to import EPUB files.</p>
    </div>

    <div id="book-grid" class="book-grid"></div>
  </main>

  <!-- Confirm remove dialog -->
  <div id="remove-overlay" class="overlay hidden">
    <div class="dialog">
      <p>Remove this book from the library?</p>
      <div class="dialog-actions">
        <button id="remove-cancel" class="btn btn-secondary">Cancel</button>
        <button id="remove-confirm" class="btn btn-danger">Remove</button>
      </div>
    </div>
  </div>

  <!-- Reader view -->
  <div id="reader-view" class="reader-view hidden">
    <div class="reader-header">
      <button id="reader-back-btn" class="btn btn-secondary">← Back</button>
      <h2 id="reader-title" class="reader-title"></h2>
      <div class="reader-nav">
        <button id="reader-prev-btn" class="btn btn-secondary">Previous</button>
        <span id="reader-chapter-info"></span>
        <button id="reader-next-btn" class="btn btn-secondary">Next</button>
      </div>
    </div>
    <div id="reader-content" class="reader-content"></div>
  </div>
</body>

</html>
