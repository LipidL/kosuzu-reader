name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-desktop:
    name: Build Windows Desktop
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: x86_64-pc-windows-msvc

      - name: Build frontend
        run: npm run build

      - name: Run tests
        working-directory: src-tauri
        run: cargo test --release --verbose

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 1

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  build-android:
    name: Build Android APK
    runs-on: windows-latest
    env:
      # Cargo registry must live on the same drive as the checkout (D:).
      # Kotlin incremental compilation computes relative paths between the
      # Tauri crate Android sources (in the registry) and the project.
      # Cross-drive relative paths are impossible on Windows, which causes
      # "this and base files have different roots" errors.
      CARGO_HOME: D:\cargo

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "ndk;27.0.12077973" "platforms;android-36" "build-tools;36.0.0"

      - name: Set NDK_HOME
        shell: bash
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: android

      - name: Setup Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/app/release.keystore
            cat > src-tauri/gen/android/app/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
            echo "Release signing configuration written"
          else
            echo "WARNING: No signing secrets found. Generating debug keystore."
            echo "Configure the following secrets for production releases:"
            echo "  ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD"
            keytool -genkey -v \
              -keystore src-tauri/gen/android/app/release.keystore \
              -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
            cat > src-tauri/gen/android/app/key.properties <<EOF
          storeFile=release.keystore
          storePassword=android
          keyAlias=debug
          keyPassword=android
          EOF
          fi

      - name: Build Tauri Android APK
        run: npx tauri android build --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 1

  create-release:
    name: Create Release
    needs: [build-desktop, build-android]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release_artifacts

          # Windows MSI
          cp windows-msi/*.msi release_artifacts/ 2>/dev/null || true

          # Windows NSIS
          cp windows-nsis/*.exe release_artifacts/ 2>/dev/null || true

          # Android APK
          find android-apk -name "*.apk" -exec cp {} release_artifacts/ \; 2>/dev/null || true

          # Copy README
          cp README.md release_artifacts/README.md

          ls -la release_artifacts/

      - name: Generate release notes
        shell: bash
        run: |
          latest_tag="${{ github.ref_name }}"
          changelog_section=$(awk "/^## ${latest_tag}/{flag=1;next}/^## /{flag=0}flag" CHANGELOG.md)
          if [ -z "$changelog_section" ]; then
            echo "Release ${latest_tag}" > release_note.md
          else
            echo "$changelog_section" > release_note.md
          fi
          echo "Release note generated:"
          cat release_note.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_artifacts/*
          draft: false
          prerelease: false
          body_path: release_note.md
