name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Desktop Builds ──────────────────────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────────
          # NOTE: musl is replaced with gnu because Tauri requires GTK/WebKit2GTK
          # shared libraries that are not available in a musl environment.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            run_tests: true

          # ubuntu-24.04-arm is GitHub's hosted ARM64 runner (free for public repos).
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: deb,appimage
            run_tests: true

          # ── Windows ──────────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            run_tests: true

          # Cross-compiled on the x86_64 host; tests cannot run on ARM64 binaries.
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis
            run_tests: false

          # ── macOS ────────────────────────────────────────────────────────────
          # macos-13 is the last Intel (x86_64) runner.
          - os: macos-13
            target: x86_64-apple-darwin
            bundles: dmg,app
            run_tests: true

          # macos-14 is Apple Silicon (aarch64).
          - os: macos-14
            target: aarch64-apple-darwin
            bundles: dmg,app
            run_tests: true

    steps:
      - uses: actions/checkout@v4

      # Tauri v2 on Linux requires GTK 3, WebKit2GTK 4.1, and related libraries.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      # npm ci gives a reproducible install from package-lock.json.
      # This also installs @tauri-apps/cli (listed in devDependencies),
      # so `npx tauri` works without a slow `cargo install tauri-cli` step.
      - name: Install frontend and Tauri CLI
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}
          workspaces: src-tauri -> target

      # Only run tests for native targets; cross-compiled binaries cannot
      # execute on the host runner.
      - name: Run Rust tests
        if: matrix.run_tests
        run: cargo test --release --verbose
        working-directory: src-tauri

      # --ci suppresses interactive prompts in the Tauri CLI.
      - name: Build Tauri desktop app
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --ci

      - name: Upload Linux bundles
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-bundles
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Windows bundles
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-bundles
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 1

      - name: Upload macOS bundles
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-bundles
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn
          retention-days: 1

  # ── Android Build ────────────────────────────────────────────────────────────
  build-android:
    name: Android (arm64 / armv7 / x86_64 / x86)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install frontend and Tauri CLI
        run: npm ci

      # Android build toolchain requires Java 17+.
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # Sets ANDROID_HOME / ANDROID_SDK_ROOT environment variables.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Tauri v2 requires NDK 26+. NDK 27 is used here for broad device support.
      - name: Install Android NDK and platform tools
        run: |
          sdkmanager \
            "ndk;27.0.11902837" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # All four ABI targets are built to produce a universal APK.
      - name: Setup Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          key: android
          workspaces: src-tauri -> target

      # gen/android is already committed to the repo (previously run `tauri android init`),
      # so we skip `init` and go straight to the build.
      # NDK_HOME must point at the versioned NDK directory.
      - name: Build Android APK
        run: npx tauri android build --apk --ci
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 1

  # ── iOS Build ────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS (arm64 device + sim)
    # Xcode and iOS simulators are only available on macOS runners.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install frontend and Tauri CLI
        run: npm ci

      # Three targets cover:
      #   aarch64-apple-ios         – physical device (arm64)
      #   aarch64-apple-ios-sim     – simulator on Apple Silicon Mac
      #   x86_64-apple-ios          – simulator on Intel Mac (legacy support)
      - name: Setup Rust toolchain with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: swatinem/rust-cache@v2
        with:
          key: ios
          workspaces: src-tauri -> target

      # gen/apple does not exist yet; `ios init` scaffolds the Xcode project.
      # Safe to run even if the directory already exists.
      - name: Initialize Tauri iOS project
        run: npx tauri ios init

      # -----------------------------------------------------------------------
      # CODE SIGNING
      # A valid Apple Developer certificate and provisioning profile are
      # required to export a distributable .ipa for the App Store or TestFlight.
      #
      # Store the following as GitHub Actions secrets to enable signed builds:
      #   IOS_CERTIFICATE            – base64-encoded .p12 certificate
      #   IOS_CERTIFICATE_PASSWORD   – password protecting the .p12
      #   IOS_PROVISIONING_PROFILE   – base64-encoded .mobileprovision file
      #
      # Without those secrets this step is skipped and an unsigned archive
      # is produced instead (suitable for CI validation only).
      # -----------------------------------------------------------------------
      - name: Import Apple signing certificate
        if: ${{ env.IOS_CERTIFICATE != '' }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$IOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}

      # The `-- CODE_SIGNING_ALLOWED=NO` argument is forwarded to xcodebuild
      # and disables signing when no certificate is available, so the build
      # still validates Rust compilation.  Remove it (and the env block)
      # once signing secrets are configured.
      - name: Build iOS app
        run: npx tauri ios build --ci -- CODE_SIGNING_ALLOWED=NO
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          # An .ipa is produced for signed builds; an .xcarchive for unsigned.
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.xcarchive
          if-no-files-found: warn
          retention-days: 1

  # ── Create GitHub Release ────────────────────────────────────────────────────
  create-release:
    name: Create Release
    needs: [build-desktop, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Download every artifact uploaded by the build jobs into a staging dir.
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Prepare release artifacts
        run: |
          mkdir -p release_artifacts

          # Collect every distributable bundle into a flat directory.
          # Tauri names bundles with version + architecture, so name collisions
          # between matrix entries are avoided automatically.
          find downloaded_artifacts -type f \( \
            -name "*.deb"           \
            -o -name "*.AppImage"   \
            -o -name "*.exe"        \
            -o -name "*.msi"        \
            -o -name "*.dmg"        \
            -o -name "*.app.tar.gz" \
            -o -name "*.apk"        \
            -o -name "*.aab"        \
            -o -name "*.ipa"        \
          \) -exec cp -v {} release_artifacts/ \;

          cp README.md release_artifacts/README.md

          echo "=== Release artifacts ==="
          ls -lh release_artifacts/

      - name: Generate release notes
        run: chmod +x scripts/generate_release_notes.sh && scripts/generate_release_notes.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_artifacts/*
          draft: false
          prerelease: false
          body_path: release_note.md

      - name: Create Release in kusuzu-reader-release
        uses: softprops/action-gh-release@v1
        with:
          files: release_artifacts/*
          draft: false
          prerelease: false
          body_path: release_note.md
          repository: LipidL/kusuzu-reader-release
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}

      - name: Push README to kusuzu-reader-release repository
        run: |
          git clone https://x-access-token:${{ secrets.TOKEN }}@github.com/LipidL/kusuzu-reader-release.git release_repo
          cp README.md release_repo/README.md
          cd release_repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update README.md for release ${{ github.ref }}" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
